    lookback_combine: mean
    allowed_regimes: [bull, bear, range, volatile]
    roi: { "0": 0.015 }
    stoploss: -0.03
    exit_config: stoch_exit

  - name: "mlb_maxabs_z1"
    signal_type: funding
    direction: both
    regime_classifier: v4ema
    params: { zscore: 1.0, lookback: 336, use_rsi: true, rsi_min: 35, rsi_max: 65 }
