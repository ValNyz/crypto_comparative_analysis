# HYPE dynamic-ROI vs. current winner (stoch_exit + flat ROI 1.5%).
# Same entry: z=1.0 lb=336 V4EMA. Used for monthly rolling 1m-detail run.
funding_signals:
  - name: "cmp_stoch_flat15"
    signal_type: funding
    direction: both
    regime_classifier: v4ema
    params: { zscore: 1.0, lookback: 336, use_rsi: true, rsi_min: 35, rsi_max: 65 }
    allowed_regimes: [bull, bear, range, volatile]
    roi: { "0": 0.015 }
    stoploss: -0.03
    exit_config: stoch_exit

  - name: "cmp_regime"
    signal_type: funding
    direction: both
    regime_classifier: v4ema
