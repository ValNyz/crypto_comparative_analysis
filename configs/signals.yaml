# =============================================================================
# SIGNALS.YAML - Configuration complète des signaux V3
# =============================================================================
#
# Format:
#   - name: Template avec placeholders {param} remplacés par les valeurs
#   - params: Listes de valeurs → génèrent toutes les combinaisons
#   - exit_config: "all" = tous les exits, liste = exits spécifiques
#   - roi/stoploss: Valeur unique ou liste pour combinaisons
#
# =============================================================================

# -----------------------------------------------------------------------------
# FUNDING CONTRARIAN SIGNALS
# -----------------------------------------------------------------------------
funding_signals:
  # === Base funding signals (ROI/SL only) ===
  - name: "f_z{zscore}_lb{lookback}_base"
    signal_type: funding
    direction: both
    params:
      zscore: [0.75, 1.0, 1.5]
      lookback: [72, 168]
      use_rsi: true
      rsi_min: 35
      rsi_max: 65
    roi: { "0": 0.02 }
    stoploss: -0.03
    exit_config: none

  # === Funding with all exit methods ===
  - name: "f_z{zscore}_lb{lookback}_x{exit_config}"
    signal_type: funding
    direction: both
    params:
      zscore: [0.75, 1.0, 1.5]
      lookback: [72, 168]
      use_rsi: true
      rsi_min: 35
      rsi_max: 65
    roi: { "0": 0.2 } # High ROI to let exits decide
    stoploss: -0.03
    exit_config: all # Expands to all exit configs
    enabled: false

  # === Funding with volume filter ===
  - name: "f_z{zscore}_lb{lookback}_vol"
    signal_type: funding
    direction: both
    params:
      zscore: [1.0, 1.5]
      lookback: [72, 168]
      use_rsi: true
      rsi_min: 35
      rsi_max: 65
      use_volume: true
      volume_min: 0.5
      volume_max: 3.0
    roi: { "0": 0.02 }
    stoploss: -0.03
    exit_config: none
    enabled: false # Désactivé par défaut

  # === Funding with ATR filter ===
  - name: "f_z{zscore}_lb{lookback}_atr"
    signal_type: funding
    direction: both
    params:
      zscore: [1.0, 1.5, 2.0]
      lookback: [72, 168]
      use_atr: true
      atr_min: 0.2
      atr_max: 0.8
    roi: { "0": 0.02 }
    stoploss: -0.03
    exit_config: none
    enabled: false

  # === Funding with Bollinger filter ===
  - name: "f_z{zscore}_lb{lookback}_bb{bb_long_max}"
    signal_type: funding
    direction: both
    params:
      zscore: [1.0, 1.5]
      lookback: [72, 168]
      use_bb: true
      bb_long_max: [0.0, -0.25, -0.5]
      bb_short_min: [0.0, 0.25, 0.5] # Inverse automatique
    roi: { "0": 0.02 }
    stoploss: -0.03
    exit_config: none
    enabled: false

  # === Funding with Stochastic filter ===
  - name: "f_z{zscore}_lb{lookback}_stoch{stoch_long_max}"
    signal_type: funding
    direction: both
    params:
      zscore: [1.0, 1.5]
      lookback: [72, 168]
      use_stoch: true
      stoch_long_max: [30, 40, 50]
      stoch_short_min: [70, 60, 50] # 100 - stoch_long_max
    roi: { "0": 0.02 }
    stoploss: -0.03
    exit_config: none
    enabled: false

  # === Funding with candle confirmation ===
  - name: "f_z{zscore}_lb{lookback}_candle"
    signal_type: funding
    direction: both
    params:
      zscore: [1.0, 1.5]
      lookback: [72, 168]
      use_candle: true
    roi: { "0": 0.02 }
    stoploss: -0.03
    exit_config: none
    enabled: false

  # === Funding with anti-trend filter ===
  - name: "f_z{zscore}_lb{lookback}_antitrend{adx_max}"
    signal_type: funding
    direction: both
    params:
      zscore: [1.0, 1.5]
      lookback: [72, 168]
      use_antitrend: true
      adx_max: [25, 30, 35]
    roi: { "0": 0.02 }
    stoploss: -0.03
    exit_config: none
    enabled: false

  # === Funding with RSI + Volume combo ===
  - name: "f_z{zscore}_lb{lookback}_rsi_vol"
    signal_type: funding
    direction: both
    params:
      zscore: [1.0, 1.5]
      lookback: [72, 168]
      use_rsi: true
      rsi_min: 35
      rsi_max: 65
      use_volume: true
      volume_min: 0.5
    roi: { "0": 0.02 }
    stoploss: -0.03
    exit_config: none
    enabled: false

  # === Funding strict multi-filter ===
  - name: "f_z{zscore}_lb{lookback}_strict"
    signal_type: funding
    direction: both
    params:
      zscore: [1.5, 2.0]
      lookback: [72, 168]
      use_rsi: true
      rsi_min: 40
      rsi_max: 60
      use_volume: true
      volume_min: 0.7
      use_atr: true
      atr_min: 0.25
      atr_max: 0.75
      use_antitrend: true
      adx_max: 30
    roi: { "0": 0.025 }
    stoploss: -0.025
    exit_config: none
    enabled: false

# -----------------------------------------------------------------------------
# TECHNICAL SIGNALS - RSI
# -----------------------------------------------------------------------------
technical_signals:
  # === RSI Oversold Long ===
  - name: "rsi_{threshold}_long"
    signal_type: rsi
    direction: long
    params:
      threshold: [25, 30, 35]
    roi: { "0": 0.02 }
    stoploss: -0.03

  # === RSI Overbought Short ===
  - name: "rsi_{threshold}_short"
    signal_type: rsi
    direction: short
    params:
      threshold: [65, 70, 75]
    roi: { "0": 0.02 }
    stoploss: -0.03

  # === Bollinger Band Long ===
  - name: "bb_{threshold}_long"
    signal_type: bollinger
    direction: long
    params:
      threshold: [1.0, 1.5, 2.0]
    roi: { "0": 0.02 }
    stoploss: -0.03

  # === Bollinger Band Short ===
  - name: "bb_{threshold}_short"
    signal_type: bollinger
    direction: short
    params:
      threshold: [1.0, 1.5, 2.0]
    roi: { "0": 0.02 }
    stoploss: -0.03

  # === EMA Cross ===
  - name: "ema_8_21_long"
    signal_type: ema_cross
    direction: long
    params: {}
    roi: { "0": 0.02 }
    stoploss: -0.03

  - name: "ema_8_21_short"
    signal_type: ema_cross
    direction: short
    params: {}
    roi: { "0": 0.02 }
    stoploss: -0.03

  # === Stochastic ===
  - name: "stoch_os_long"
    signal_type: stochastic
    direction: long
    params:
      threshold: 20
    roi: { "0": 0.02 }
    stoploss: -0.03

  - name: "stoch_ob_short"
    signal_type: stochastic
    direction: short
    params:
      threshold: 80
    roi: { "0": 0.02 }
    stoploss: -0.03

  # === MACD Cross ===
  - name: "macd_cross_long"
    signal_type: macd
    direction: long
    params: {}
    roi: { "0": 0.02 }
    stoploss: -0.03

  - name: "macd_cross_short"
    signal_type: macd
    direction: short
    params: {}
    roi: { "0": 0.02 }
    stoploss: -0.03

  # === Reversal (consecutive candles) ===
  - name: "reversal_{candles}_long"
    signal_type: reversal
    direction: long
    params:
      candles: [3, 4, 5]
    roi: { "0": 0.02 }
    stoploss: -0.03

  - name: "reversal_{candles}_short"
    signal_type: reversal
    direction: short
    params:
      candles: [3, 4, 5]
    roi: { "0": 0.02 }
    stoploss: -0.03

  # === Z-Score Price ===
  - name: "zscore_{threshold}_long"
    signal_type: zscore
    direction: long
    params:
      threshold: [2.0, 2.5]
    roi: { "0": 0.02 }
    stoploss: -0.03

  - name: "zscore_{threshold}_short"
    signal_type: zscore
    direction: short
    params:
      threshold: [2.0, 2.5]
    roi: { "0": 0.02 }
    stoploss: -0.03

  # === Multi-factor (3+ indicators) ===
  - name: "multi_os_long"
    signal_type: multi
    direction: long
    params: {}
    roi: { "0": 0.02 }
    stoploss: -0.03

  - name: "multi_ob_short"
    signal_type: multi
    direction: short
    params: {}
    roi: { "0": 0.02 }
    stoploss: -0.03

# -----------------------------------------------------------------------------
# ADVANCED SIGNALS
# -----------------------------------------------------------------------------
advanced_signals:
  # === Williams %R ===
  - name: "willr_os_long"
    signal_type: williams_r
    direction: long
    params:
      threshold: -80
    roi: { "0": 0.02 }
    stoploss: -0.03

  - name: "willr_ob_short"
    signal_type: williams_r
    direction: short
    params:
      threshold: -20
    roi: { "0": 0.02 }
    stoploss: -0.03

  # === CCI (Commodity Channel Index) ===
  - name: "cci_{threshold}_long"
    signal_type: cci
    direction: long
    params:
      threshold: [-100, -150, -200] # Negative for oversold
    roi: { "0": 0.02 }
    stoploss: -0.03

  - name: "cci_{threshold}_short"
    signal_type: cci
    direction: short
    params:
      threshold: [100, 150, 200] # Positive for overbought
    roi: { "0": 0.02 }
    stoploss: -0.03

  # === ROC (Rate of Change) Reversal ===
  - name: "roc_reversal_long"
    signal_type: roc
    direction: long
    params:
      period: 12
      threshold: -5
    roi: { "0": 0.02 }
    stoploss: -0.03

  - name: "roc_reversal_short"
    signal_type: roc
    direction: short
    params:
      period: 12
      threshold: 5
    roi: { "0": 0.02 }
    stoploss: -0.03

  # === RSI Divergence ===
  - name: "rsi_div_bull"
    signal_type: divergence
    direction: long
    params:
      indicator: rsi
      lookback: 14
    roi: { "0": 0.02 }
    stoploss: -0.03

  - name: "rsi_div_bear"
    signal_type: divergence
    direction: short
    params:
      indicator: rsi
      lookback: 14
    roi: { "0": 0.02 }
    stoploss: -0.03

  # === OBV Divergence ===
  - name: "obv_div_bull"
    signal_type: divergence
    direction: long
    params:
      indicator: obv
      lookback: 20
    roi: { "0": 0.02 }
    stoploss: -0.03

  - name: "obv_div_bear"
    signal_type: divergence
    direction: short
    params:
      indicator: obv
      lookback: 20
    roi: { "0": 0.02 }
    stoploss: -0.03

  # === Squeeze Momentum (John Carter) ===
  - name: "squeeze_long"
    signal_type: squeeze
    direction: long
    params: {}
    roi: { "0": 0.02 }
    stoploss: -0.03

  - name: "squeeze_short"
    signal_type: squeeze
    direction: short
    params: {}
    roi: { "0": 0.02 }
    stoploss: -0.03

  # === Keltner Channel Breakout ===
  - name: "keltner_break_long"
    signal_type: keltner
    direction: long
    params:
      mult: 2.0
    roi: { "0": 0.02 }
    stoploss: -0.03

  - name: "keltner_break_short"
    signal_type: keltner
    direction: short
    params:
      mult: 2.0
    roi: { "0": 0.02 }
    stoploss: -0.03

  # === Donchian Channel (Turtle Trading) ===
  - name: "donchian_{period}_long"
    signal_type: donchian
    direction: long
    params:
      period: [20]
    roi: { "0": 0.02 }
    stoploss: -0.03

  - name: "donchian_{period}_short"
    signal_type: donchian
    direction: short
    params:
      period: [20]
    roi: { "0": 0.02 }
    stoploss: -0.03

  # === VWAP Reversion ===
  - name: "vwap_long"
    signal_type: vwap
    direction: long
    params:
      dev: -2.0
    roi: { "0": 0.02 }
    stoploss: -0.03

  - name: "vwap_short"
    signal_type: vwap
    direction: short
    params:
      dev: 2.0
    roi: { "0": 0.02 }
    stoploss: -0.03

  # === Volume Spike ===
  - name: "vol_spike_long"
    signal_type: volume_spike
    direction: long
    params:
      vol_mult: 2.0
    roi: { "0": 0.02 }
    stoploss: -0.03

  - name: "vol_spike_short"
    signal_type: volume_spike
    direction: short
    params:
      vol_mult: 2.0
    roi: { "0": 0.02 }
    stoploss: -0.03

  # === Open Interest Divergence ===
  - name: "oi_div_long"
    signal_type: oi_divergence
    direction: long
    params: {}
    roi: { "0": 0.02 }
    stoploss: -0.03

  - name: "oi_div_short"
    signal_type: oi_divergence
    direction: short
    params: {}
    roi: { "0": 0.02 }
    stoploss: -0.03

  # === Liquidation Cascade ===
  - name: "liq_cascade_long"
    signal_type: liquidation
    direction: long
    params:
      threshold: 2.0
    roi: { "0": 0.02 }
    stoploss: -0.03

  - name: "liq_cascade_short"
    signal_type: liquidation
    direction: short
    params:
      threshold: 2.0
    roi: { "0": 0.02 }
    stoploss: -0.03

# -----------------------------------------------------------------------------
# COMBO / CONFLUENCE SIGNALS
# -----------------------------------------------------------------------------
combo_signals:
  # === Mean Reversion Confluence Long (3 of 5 oversold) ===
  - name: "combo_mr_3of5_long"
    signal_type: combo
    direction: long
    params:
      min_signals: 3
      signals:
        - rsi_os
        - bb_low
        - stoch_os
        - zscore_low
        - willr_os
      confirm: is_green
    roi: { "0": 0.02 }
    stoploss: -0.03

  # === Mean Reversion Confluence Short (3 of 5 overbought) ===
  - name: "combo_mr_3of5_short"
    signal_type: combo
    direction: short
    params:
      min_signals: 3
      signals:
        - rsi_ob
        - bb_high
        - stoch_ob
        - zscore_high
        - willr_ob
      confirm: is_red
    roi: { "0": 0.02 }
    stoploss: -0.03

  # === Trend + Momentum Long ===
  - name: "combo_trend_mom_long"
    signal_type: combo
    direction: long
    params:
      conditions:
        - ema_bull
        - adx_strong
        - macd_positive
        - volume_above_avg
    roi: { "0": 0.03 }
    stoploss: -0.04

  # === Trend + Momentum Short ===
  - name: "combo_trend_mom_short"
    signal_type: combo
    direction: short
    params:
      conditions:
        - ema_bear
        - adx_strong
        - macd_negative
        - volume_above_avg
    roi: { "0": 0.03 }
    stoploss: -0.04

  # === Volume Spike + Oversold Long ===
  - name: "combo_vol_os_long"
    signal_type: combo
    direction: long
    params:
      min_signals: 2
      signals:
        - rsi_os
        - bb_low
        - stoch_os
      extra_conditions:
        - volume_spike
        - is_green
    roi: { "0": 0.025 }
    stoploss: -0.03

  # === Strong Reversal Long (4 of 6) ===
  - name: "combo_strong_rev_long"
    signal_type: combo
    direction: long
    params:
      min_signals: 4
      signals:
        - rsi_os
        - bb_low
        - stoch_os
        - zscore_low
        - willr_os
        - mfi_os
      confirm: is_green
    roi: { "0": 0.025 }
    stoploss: -0.035
    enabled: false

  # === Strong Reversal Short (4 of 6) ===
  - name: "combo_strong_rev_short"
    signal_type: combo
    direction: short
    params:
      min_signals: 4
      signals:
        - rsi_ob
        - bb_high
        - stoch_ob
        - zscore_high
        - willr_ob
        - mfi_ob
      confirm: is_red
    roi: { "0": 0.025 }
    stoploss: -0.035
    enabled: false
