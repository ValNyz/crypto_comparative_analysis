# =============================================================================
# configs/signals.yaml
# =============================================================================
# Définition complète de tous les signaux de trading
#
# Structure d'un signal:
#   name: Nom unique du signal
#   signal_type: Type (funding, rsi, bollinger, ema_cross, etc.)
#   direction: long, short, ou both
#   params: Paramètres spécifiques au signal
#   roi: Return on Investment targets {"0": 0.02}
#   stoploss: Stop loss (-0.03 = -3%)
#   exit_config: Nom de la config d'exit à utiliser (référence exits.yaml)
#   allowed_regimes: Liste des régimes autorisés (optionnel, auto-détecté sinon)
#   timeframe_override: Override du timeframe (optionnel)

# =============================================================================
# FUNDING CONTRARIAN SIGNALS
# =============================================================================

funding_signals:
  # Paramètres de base pour générer les variantes
  base_params:
    zscore_thresholds: [0.75, 1.0, 1.5]
    lookbacks: [72, 168]
    default_roi: { "0": 0.02 }
    default_stoploss: -0.03
    exit_roi: { "0": 0.2 } # ROI élevé quand exit method utilisée

  # Signaux de base (sans exit method spécifique)
  signals:
    - name: "f_z0.75_lb72_base"
      signal_type: funding
      direction: both
      params:
        zscore: 0.75
        lookback: 72
        use_rsi: true
        rsi_min: 35
        rsi_max: 65
      roi: { "0": 0.02 }
      stoploss: -0.03
      exit_config: none

    - name: "f_z0.75_lb168_base"
      signal_type: funding
      direction: both
      params:
        zscore: 0.75
        lookback: 168
        use_rsi: true
        rsi_min: 35
        rsi_max: 65
      roi: { "0": 0.02 }
      stoploss: -0.03
      exit_config: none

    - name: "f_z1.0_lb72_base"
      signal_type: funding
      direction: both
      params:
        zscore: 1.0
        lookback: 72
        use_rsi: true
        rsi_min: 35
        rsi_max: 65
      roi: { "0": 0.02 }
      stoploss: -0.03
      exit_config: none

    - name: "f_z1.0_lb168_base"
      signal_type: funding
      direction: both
      params:
        zscore: 1.0
        lookback: 168
        use_rsi: true
        rsi_min: 35
        rsi_max: 65
      roi: { "0": 0.02 }
      stoploss: -0.03
      exit_config: none

    - name: "f_z1.5_lb72_base"
      signal_type: funding
      direction: both
      params:
        zscore: 1.5
        lookback: 72
        use_rsi: true
        rsi_min: 35
        rsi_max: 65
      roi: { "0": 0.02 }
      stoploss: -0.03
      exit_config: none

    - name: "f_z1.5_lb168_base"
      signal_type: funding
      direction: both
      params:
        zscore: 1.5
        lookback: 168
        use_rsi: true
        rsi_min: 35
        rsi_max: 65
      roi: { "0": 0.02 }
      stoploss: -0.03
      exit_config: none

  # Template pour génération automatique avec exits
  # Le code génèrera automatiquement les variantes avec chaque exit method
  generate_with_exits:
    enabled: true
    base_signals:
      - { zscore: 0.75, lookback: 72 }
      - { zscore: 0.75, lookback: 168 }
      - { zscore: 1.0, lookback: 72 }
      - { zscore: 1.0, lookback: 168 }
      - { zscore: 1.5, lookback: 72 }
      - { zscore: 1.5, lookback: 168 }
    common_params:
      use_rsi: true
      rsi_min: 35
      rsi_max: 65
    roi_with_exit: { "0": 0.2 }
    stoploss: -0.03

