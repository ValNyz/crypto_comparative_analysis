# =============================================================================
# COMBO SIGNALS
# =============================================================================

combo_signals:
  - name: combo_mr_3of5_long
    signal_type: combo
    direction: long
    params:
      min_signals: 3
      signals:
        - rsi_os
        - bb_low
        - stoch_os
        - zscore_low
        - willr_os
      confirm: is_green
    roi: { "0": 0.02 }
    stoploss: -0.03
    exit_config: none

  - name: combo_mr_3of5_short
    signal_type: combo
    direction: short
    params:
      min_signals: 3
      signals:
        - rsi_ob
        - bb_high
        - stoch_ob
        - zscore_high
        - willr_ob
      confirm: is_red
    roi: { "0": 0.02 }
    stoploss: -0.03
    exit_config: none

  - name: combo_trend_mom_long
    signal_type: combo
    direction: long
    params:
      conditions:
        - ema_bull
        - adx_strong
        - macd_positive
        - volume_above_avg
    roi: { "0": 0.03 }
    stoploss: -0.04
    exit_config: none

  - name: combo_trend_mom_short
    signal_type: combo
    direction: short
    params:
      conditions:
        - ema_bear
        - adx_strong
        - macd_negative
        - volume_above_avg
    roi: { "0": 0.03 }
    stoploss: -0.04
    exit_config: none

  - name: combo_vol_os_long
    signal_type: combo
    direction: long
    params:
      min_signals: 2
      signals:
        - rsi_os
        - bb_low
        - stoch_os
      extra_conditions:
        - volume_spike
        - is_green
    roi: { "0": 0.025 }
    stoploss: -0.03
    exit_config: none
