    direction: long
    roi: [{ "0": 0.02 }]
    stoploss: [-0.03, -0.05, -0.10]
    exit_config: [none, trailing_roi_2_1]
    # = 4
  - name: "trig_rbtc_breakout_short"
    signal_type: ratio_btc_breakout
    direction: short
    roi: [{ "0": 0.02 }]
    stoploss: [-0.03, -0.05, -0.10]
    exit_config: [none, trailing_roi_2_1]
    # = 4

  # Ratios coin/ETH (ratio_eth_extreme_high top short)
  - name: "trig_reth_extreme_long"
    signal_type: ratio_eth_extreme
