    roi: [{ "0": 0.02 }]
    stoploss: [-0.03, -0.05, -0.10]
    exit_config: [none, trailing_roi_1_05]
    # = 4
  - name: "trig_reth_breakout_long"
    signal_type: ratio_eth_breakout
    direction: long
    roi: [{ "0": 0.02 }]
